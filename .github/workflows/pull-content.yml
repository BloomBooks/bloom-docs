name: Pull Content from Notion and Ref-Docs
on:
  workflow_call:
    inputs:
      pull_notion:
        description: "Pull from Notion"
        type: boolean
        default: true
      download_ref_docs:
        description: "Download ref-docs"
        type: boolean
        default: false
      convert_ref_docs:
        description: "Convert ref-docs to Markdown"
        type: boolean
        default: false
      ref_docs_incremental:
        description: "Use incremental conversion for ref-docs"
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      pull_notion:
        description: "Pull from Notion"
        type: boolean
        default: true
      download_ref_docs:
        description: "Download ref-docs"
        type: boolean
        default: false
      convert_ref_docs:
        description: "Convert ref-docs to Markdown"
        type: boolean
        default: false
      ref_docs_incremental:
        description: "Use incremental conversion for ref-docs"
        type: boolean
        default: false

jobs:
  pull-content:
    name: Pull Content from Sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Node.js as specified in package.json
        uses: volta-cli/action@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.4
          cache: true
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull from Notion
        if: ${{ inputs.pull_notion }}
        env:
          SIL_BLOOM_DOCS_NOTION_TOKEN: ${{ secrets.SIL_BLOOM_DOCS_NOTION_TOKEN }}
          SIL_BLOOM_DOCS_NOTION_ROOT_PAGE: ${{ secrets.SIL_BLOOM_DOCS_NOTION_ROOT_PAGE }}
        run: pnpm pull

      - name: Download reference docs
        if: ${{ inputs.download_ref_docs }}
        env:
          REF_DOCS_INCREMENTAL: ${{ inputs.ref_docs_incremental }}
        run: |
          if [ "${REF_DOCS_INCREMENTAL}" = "true" ]; then
            npx tsx ref-docs/download.ts --incremental
          else
            npx tsx ref-docs/download.ts
          fi

      - name: Convert reference docs to Markdown
        if: ${{ inputs.convert_ref_docs }}
        env:
          REF_DOCS_INCREMENTAL: ${{ inputs.ref_docs_incremental }}
        run: |
          if [ "${REF_DOCS_INCREMENTAL}" = "true" ]; then
            npx tsx ref-docs/convert.ts --incremental
          else
            npx tsx ref-docs/convert.ts
          fi

      # Why this step exists:
      # docu-notion (the "Pull from Notion" step above) treats the ENTIRE ./docs
      # tree as its own. At startup it scans docs/ for every *.md file, then after
      # writing the Notion pages it deletes any *.md it didn't just write (see
      # cleanupOldFiles() in @sillsdev/docu-notion's LayoutStrategy). That's how it
      # removes pages you unpublished/renamed in Notion -- but it also wipes the
      # committed reference docs at docs/Help/Reference, which come from ref-docs/
      # (RoboHelp), not Notion. (docs/Help is a mixed directory: Troubleshooting/,
      # Technical-Notes/, forum.md, etc. are Notion's; Reference/ is ref-docs'.)
      #
      # If we ALSO ran the convert step above, it regenerates Reference right after,
      # so no harm. But on a Notion-only pull nothing regenerates it, and the commit
      # step below would record the deletion of ref-docs files. So when we
      # pull from Notion without re-converting, restore the committed copies.
      # (Only *.md is at risk: docu-notion's scan ignores .mdx/.json, so the
      # _category_.json sidebar files and the static/ref-docs-assets images survive.)
      #
      # This is a band-aid. The real fix is to 
      # EITHER:
      #   - Generate them outside docs/ (say ref-docs/generated-md/) and copy them
      #     into docs/Help/Reference at build/start time -- mirroring how static-docs/
      #     is handled by `pnpm copy-static-docs`.
      #   - OR Improve docu-notion to allow exempting a subdirectory from deletion.
      # Either removes the need for this step.
      - name: Restore reference docs deleted by Notion pull
        if: ${{ inputs.pull_notion && !inputs.convert_ref_docs }}
        run: git checkout HEAD -- docs/Help/Reference

      - name: copy-static-docs
        run: pnpm copy-static-docs

      - name: Commit New Source Material
        if: ${{ inputs.pull_notion || inputs.download_ref_docs || inputs.convert_ref_docs }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: GHAction - Commit content changes pulled from notion and ref-docs
